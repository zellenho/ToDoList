    /* ── Category rename ── */
    function startRename(id) {
      const span = document.getElementById('cat-name-' + id);
      if (!span) return;
      const cat = state.categories.find(c => c.id === id);
      if (!cat) return;
      const inp = document.createElement('input');
      inp.className = 'cat-rename-input';
      inp.value = cat.name;
      inp.maxLength = 30;
      inp.onclick = e => e.stopPropagation();
      inp.onblur  = () => commitRename(id, inp.value);
      inp.onkeydown = e => {
        if (e.key === 'Enter')  { inp.blur(); }
        if (e.key === 'Escape') { inp.value = cat.name; inp.blur(); }
        e.stopPropagation();
      };
      span.replaceWith(inp);
      inp.focus();
      inp.select();
    }

    function commitRename(id, value) {
      const name = value.trim();
      const cat = state.categories.find(c => c.id === id);
      if (cat && name) cat.name = name;
      save();
      render();
    }

    /* ── Export / Import / Share ── */
    function normalizeTasks(tasks) {
      return tasks.map(t => {
        const showMoney = t.costType === 'money' || t.costType === 'both';
        const showTime  = t.costType === 'time'  || t.costType === 'both';
        return { ...t, priority: t.priority || 'medium', cost: t.cost ?? null, costTime: t.costTime ?? null, showMoney: t.showMoney ?? showMoney, showTime: t.showTime ?? showTime };
      });
    }

    function applyImport(incoming) {
      state = { ...incoming, tasks: normalizeTasks(incoming.tasks), lastModified: Date.now() };
      save();
      frozenOrder = null;
      clearTimeout(sortTimer);
      render();
    }

    async function exportData() {
      const json = JSON.stringify(state, null, 2);
      const file = new File([json], 'todo-list.json', { type: 'application/json' });

      // iOS Safari/Chrome: native share sheet with the file attached
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try { await navigator.share({ files: [file], title: 'My to-do list' }); return; }
        catch (e) { if (e.name === 'AbortError') return; }
      }

      // Older iOS / desktop: classic download
      const blob = new Blob([json], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'todo-list.json';
      a.click();
      URL.revokeObjectURL(a.href);
    }

    async function shareLink() {
      const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(state))));

      // file:// URLs are not portable across devices — always fall back to share-code
      const isLocalFile = location.protocol === 'file:';

      if (!isLocalFile) {
        const url = `${location.origin}${location.pathname}#import=${encoded}`;
        if (navigator.share) {
          try { await navigator.share({ url, title: 'My to-do list' }); return; }
          catch (e) { if (e.name === 'AbortError') return; }
        }
        try { await navigator.clipboard.writeText(url); alert('Share link copied!\n\nAnyone with this app installed can tap the link to import your list.'); return; }
        catch {}
        prompt('Copy this link:', url);
        return;
      }

      // Local file mode — share just the code, recipient pastes via "Paste Code"
      const codeText = `[My to-do list — paste this in the app via 📋 Paste]\n\n${encoded}`;
      if (navigator.share) {
        try { await navigator.share({ text: codeText, title: 'My to-do list' }); return; }
        catch (e) { if (e.name === 'AbortError') return; }
      }
      try { await navigator.clipboard.writeText(encoded); alert('Share code copied to clipboard!\n\nSend it to your wife. She can import it in her app via "📋 Paste".'); }
      catch { prompt('Copy this share code and send it. The recipient pastes it via "📋 Paste":', encoded); }
    }

    async function pasteImport() {
      let code = '';
      // Try clipboard first (iOS Safari supports it on user gesture in HTTPS; on file:// it usually fails)
      try {
        const fromClip = (await navigator.clipboard.readText()).trim();
        if (fromClip) code = fromClip;
      } catch {}
      if (!code) code = prompt('Paste the share code your spouse sent you:') || '';
      code = code.trim();
      if (!code) return;
      // Strip the prefix if they pasted the whole "[My to-do list...] code" block
      const m = code.match(/[A-Za-z0-9+/=]{20,}\s*$/);
      if (m) code = m[0];
      try {
        const incoming = JSON.parse(decodeURIComponent(escape(atob(code))));
        if (!incoming.categories || !incoming.tasks) throw new Error('invalid');
        if (confirm(`Import ${incoming.tasks.length} task(s) across ${incoming.categories.length} category/categories?\n\nThis will replace your current list.`)) {
          applyImport(incoming);
        }
      } catch {
        alert('That doesn\'t look like a valid share code.');
      }
    }

    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const imported = JSON.parse(e.target.result);
          if (!imported.categories || !imported.tasks) throw new Error('invalid');
          if (!confirm(`Import ${imported.tasks.length} task(s) across ${imported.categories.length} category/categories?\n\nThis will replace your current list.`)) return;
          applyImport(imported);
        } catch {
          alert('Could not read that file. Make sure it\'s a todo-list.json exported from this app.');
        }
        event.target.value = '';
      };
      reader.readAsText(file);
    }

    /* ── Cloud sync (Firebase Realtime Database) ── */

    // Stable fingerprint of the actual data — detects real changes, ignores timestamp noise
    function stateFingerprint(s) {
      const taskSig = s.tasks
        .map(t => `${t.id}:${t.done}:${t.text}:${t.priority}:${t.owner}:${t.category}`)
        .sort()
        .join('|');
      const catSig = s.categories.map(c => c.id).sort().join('|');
      return taskSig + '@@' + catSig;
    }

    // Remove duplicate task IDs, keeping the last occurrence
    function deduplicateTasks(tasks) {
      const seen = new Map();
      for (const t of tasks) seen.set(String(t.id), t);
      return Array.from(seen.values());
    }

    async function syncPush() {
      if (!firebaseRef) return;
      if (pushInFlight) { syncPending = true; return; }
      pushInFlight = true;
      try {
        await firebaseRef.set(state);
        lastSyncOk = true;
      } catch { lastSyncOk = false; }
      pushInFlight = false;
      updateSyncBtn();
      if (syncPending) { syncPending = false; syncPush(); }
    }

    function attachFirebaseListener() {
      if (!firebaseRef) return;
      if (syncListener) {
        firebaseRef.off('value', syncListener);
        syncListener = null;
      }
      syncListener = firebaseRef.on('value', snapshot => {
        const remote = snapshot.val();
        if (!remote || !remote.tasks || !remote.categories) {
          // Nothing in Firebase yet — push local state up
          syncPush();
          lastSyncOk = true; updateSyncBtn(); return;
        }

        remote.tasks = deduplicateTasks(normalizeTasks(remote.tasks));

        if (stateFingerprint(remote) === stateFingerprint(state)) {
          lastSyncOk = true; updateSyncBtn(); return;
        }

        const remoteTs = remote.lastModified ?? 0;
        const localTs  = state.lastModified  ?? 0;

        if (remoteTs < localTs) {
          // Local is newer — push up, don't overwrite local
          lastSyncOk = true; updateSyncBtn();
          syncPush();
          return;
        }

        // Remote is newer — accept it
        state = { ...remote, tasks: remote.tasks };
        localStorage.setItem('todo-state', JSON.stringify(state));
        frozenOrder = null;
        render();
        lastSyncOk = true;
        updateSyncBtn();
        showSyncToast();
      }, () => { lastSyncOk = false; updateSyncBtn(); });
    }

    function detachFirebaseListener() {
      if (syncListener && firebaseRef) {
        firebaseRef.off('value', syncListener);
        syncListener = null;
      }
    }

    async function initFirebase(config) {
      return new Promise((resolve, reject) => {
        // Load the Firebase compat SDKs dynamically
        const sdkBase = 'https://www.gstatic.com/firebasejs/10.12.2/firebase-';
        let loaded = 0;
        const scripts = ['app-compat.js', 'database-compat.js'];
        scripts.forEach(name => {
          const s = document.createElement('script');
          s.src = sdkBase + name;
          s.onload = () => { if (++loaded === scripts.length) resolve(); };
          s.onerror = reject;
          document.head.appendChild(s);
        });
      }).then(() => {
        if (!firebase.apps.length) firebase.initializeApp(config);
        firebaseDb  = firebase.database();
        firebaseRef = firebaseDb.ref('todolist');
      });
    }

    /* ── Sync modal ── */
    function openSyncModal() {
      const dv = document.getElementById('sync-disconnected-view');
      const cv = document.getElementById('sync-connected-view');
      const actions = document.getElementById('sync-modal-actions');
      document.getElementById('sync-error').textContent = '';
      if (firebaseConfig) {
        dv.style.display = 'none';
        cv.style.display = '';
        document.getElementById('sync-id-display').textContent = firebaseConfig.projectId || '(unknown)';
        const age = lastSyncOk === null ? 'Connecting…' : lastSyncOk ? 'Live sync active' : 'Sync error — check connection';
        document.getElementById('sync-status-text').textContent = age;
        actions.innerHTML = `
          <button class="btn-delete-modal" onclick="disconnectFirebase()">Disconnect</button>
          <button class="btn-cancel" onclick="closeSyncModal()">Close</button>`;
      } else {
        dv.style.display = '';
        cv.style.display = 'none';
        const inp = document.getElementById('firebase-input');
        inp.value = '';
        actions.innerHTML = `
          <button class="btn-cancel" onclick="closeSyncModal()">Cancel</button>
          <button class="btn-save" onclick="connectFirebase()">Connect</button>`;
        setTimeout(() => inp.focus(), 80);
      }
      document.getElementById('sync-modal-backdrop').classList.add('open');
    }

    function closeSyncModal() {
      document.getElementById('sync-modal-backdrop').classList.remove('open');
    }

    function handleSyncBackdropClick(e) {
      if (e.target === document.getElementById('sync-modal-backdrop')) closeSyncModal();
    }

    async function connectFirebase() {
      const raw = document.getElementById('firebase-input').value.trim();
      const errEl = document.getElementById('sync-error');
      if (!raw) { errEl.textContent = 'Paste your Firebase config JSON above.'; return; }
      let config;
      try { config = JSON.parse(raw); } catch {
        errEl.textContent = 'Invalid JSON — copy it exactly from Firebase console.'; return;
      }
      if (!config.apiKey || !config.databaseURL || !config.projectId) {
        errEl.textContent = 'Config is missing apiKey, databaseURL, or projectId.'; return;
      }
      errEl.textContent = 'Connecting…';
      try {
        await initFirebase(config);
        firebaseConfig = config;
        localStorage.setItem('firebase-config', JSON.stringify(config));
        lastSyncOk = true;
        attachFirebaseListener();
        closeSyncModal();
        updateSyncBtn();
      } catch (e) {
        errEl.textContent = 'Could not connect. Check your config and internet connection.';
        firebaseDb = null; firebaseRef = null;
      }
    }

    function disconnectFirebase() {
      if (!confirm('Disconnect from Firebase? Your local data is kept, but changes will no longer sync.')) return;
      detachFirebaseListener();
      firebaseConfig = null; firebaseDb = null; firebaseRef = null;
      localStorage.removeItem('firebase-config');
      lastSyncOk = null;
      updateSyncBtn();
      closeSyncModal();
    }

    function showSyncToast() {
      const t = document.getElementById('sync-toast');
      t.style.opacity = '1';
      setTimeout(() => { t.style.opacity = '0'; }, 2200);
    }

    function updateSyncBtn() {
      const dot = document.getElementById('sync-dot');
      const lbl = document.getElementById('sync-label');
      if (!dot) return;
      dot.className = 'sync-dot' + (firebaseConfig ? (lastSyncOk === false ? ' error' : ' connected') : '');
      lbl.textContent = firebaseConfig ? 'Synced' : 'Sync';
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.getElementById('new-task').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    document.getElementById('edit-text').addEventListener('keydown', e => {
      if (e.key === 'Enter') saveEdit();
      if (e.key === 'Escape') closeModal();
    });

    document.getElementById('new-cat').addEventListener('keydown', e => {
      if (e.key === 'Enter') addCategory();
    });

    // Auto-import from a share link (#import=...)
    (function checkHashImport() {
      const m = location.hash.match(/^#import=(.+)$/);
      if (!m) return;
      try {
        const incoming = JSON.parse(decodeURIComponent(escape(atob(m[1]))));
        if (incoming.categories && incoming.tasks) {
          if (confirm(`You received a shared list with ${incoming.tasks.length} task(s).\n\nImport it? This will replace your current list.`)) {
            applyImport(incoming);
          }
        }
      } catch {} // ignore malformed hashes
      history.replaceState(null, '', location.pathname);
    })();

    /* ── Sidebar collapse ── */
    function toggleManageMode() {
      const sidebar = document.getElementById('sidebar');
      const btn = document.getElementById('mobile-manage-btn');
      const managing = sidebar.classList.toggle('managing');
      if (btn) btn.textContent = managing ? 'Done' : 'Manage';
    }

    function toggleSidebar() {
      if (window.innerWidth <= 720) return;
      const sidebar = document.getElementById('sidebar');
      const collapsed = sidebar.classList.toggle('collapsed');
      localStorage.setItem('sidebar-collapsed', collapsed ? '1' : '0');
      document.getElementById('sidebar-toggle').textContent = collapsed ? '»' : '☰';
    }

    let _scrollY = 0;

    function toggleMobileNav() {
      if (window.innerWidth > 720) return;
      const sidebar = document.getElementById('sidebar');
      const isOpen = !sidebar.classList.contains('mobile-open');
      const header = document.querySelector('.main-header');
      const backdrop = document.getElementById('mobile-backdrop');
      const headerH = header.getBoundingClientRect().bottom;
      document.documentElement.style.setProperty('--mobile-header-h', headerH + 'px');
      if (isOpen) {
        _scrollY = window.scrollY;
        document.body.style.top = `-${_scrollY}px`;
        document.body.classList.add('nav-open');
      } else {
        document.body.classList.remove('nav-open');
        document.body.style.top = '';
        window.scrollTo(0, _scrollY);
      }
      sidebar.classList.toggle('mobile-open', isOpen);
      header.classList.toggle('open', isOpen);
      backdrop.classList.toggle('open', isOpen);
    }

    function closeMobileNav() {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.remove('mobile-open', 'managing');
      const btn = document.getElementById('mobile-manage-btn');
      if (btn) btn.textContent = 'Manage';
      const header = document.querySelector('.main-header');
      if (header) header.classList.remove('open');
      const backdrop = document.getElementById('mobile-backdrop');
      if (backdrop) backdrop.classList.remove('open');
      document.body.classList.remove('nav-open');
      document.body.style.top = '';
      window.scrollTo(0, _scrollY);
    }

    // Restore sidebar state — collapsed by default on desktop, always expanded on mobile
    (function initSidebar() {
      const isMobile = window.innerWidth <= 720;
      const saved = localStorage.getItem('sidebar-collapsed');
      const collapsed = !isMobile && (saved === null ? true : saved === '1');
      const sidebar = document.getElementById('sidebar');
      if (collapsed) sidebar.classList.add('collapsed');
      document.getElementById('sidebar-toggle').textContent = collapsed ? '»' : '☰';
    })();

    render();
    updateSyncBtn();
    if (firebaseConfig) {
      initFirebase(firebaseConfig).then(() => {
        attachFirebaseListener();
        updateSyncBtn();
      }).catch(() => { lastSyncOk = false; updateSyncBtn(); });
    }

    // Mobile header tap → open/close category overlay
    document.querySelector('.main-header').addEventListener('click', toggleMobileNav);
    document.getElementById('mobile-backdrop').addEventListener('click', closeMobileNav);
  </script>
</body>
</html>
