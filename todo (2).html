<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="screen-orientation" content="portrait">
  <title>To-Do List</title>
  <style>
    /* Lock to portrait on mobile — rotate content back if device is held landscape */
    @media (orientation: landscape) and (max-width: 1024px) {
      html {
        transform: rotate(-90deg);
        transform-origin: left top;
        width: 100vh;
        height: 100vw;
        overflow-x: hidden;
        position: absolute;
        top: 100%;
        left: 0;
      }
    }
    :root {
      --priority-high: #e53935;
      --priority-medium: #f5a623;
      --priority-low: #4f6ef7;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    button, .priority-pill, .btn-icon, .data-btn, .cost-toggle-btn,
    .cat-action-btn, .add-subcat-btn, .add-cat-btn, .add-btn, .modal-actions button {
      transition: background 0.15s, color 0.15s, border-color 0.15s, opacity 0.15s;
    }
    /* Active feedback for all pointers (works on touch AND mouse) */
    button:active, .priority-pill:active, .btn-icon:active, .data-btn:active,
    .cost-toggle-btn:active, .cat-action-btn:active, .cat-list li:active,
    .add-cat-btn:active, .add-btn:active, .modal-actions button:active,
    .cost-quick-btn:active, .sidebar-icon-dot:active {
      opacity: 0.7;
    }
    /* Hover styles only apply when a real pointer (mouse) is present */
    @media (hover: hover) {
      .cat-list li:hover { background: #3d4e72; }
      .cat-list li.active:hover { background: #4f6ef7; }
      .add-cat-btn:hover { background: #3a57d6; }
      .data-btn:hover { background: #4f6ef7; border-color: #4f6ef7; color: #fff; }
      .add-form-row button.add-btn:hover { background: #3a57d6; }
      .btn-icon:hover { color: #4f6ef7; background: #eef1ff; }
      .sidebar-toggle:hover { color: #fff; }
      .sidebar-icon-dot:hover { transform: scale(1.15); }
      .sidebar-icon-dot:hover::after { opacity: 1; }
      .sidebar-icon-sync:hover { color: #fff; }
      .cat-action-btn:hover { color: #fff !important; }
      .cat-action-btn.delete:hover { color: #e55 !important; }
      .add-subcat-btn:hover { color: #3bb87f !important; }
      .cost-quick-btn:hover:not(.on) { border-color: #4f6ef7; color: #4f6ef7; }
      .btn-cancel:hover { background: #e2e5ea; }
      .btn-save:hover { background: #3a57d6; }
      .btn-delete-modal:hover { background: #fde0e0; }
      .footer button:hover { text-decoration: underline; }
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex;
      min-height: 100%;
      overscroll-behavior-y: contain;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px;
      flex-shrink: 0;
      background: #2d3a5c;
      color: #fff;
      display: flex;
      flex-direction: column;
      padding: 0;
      height: 100vh;
      position: sticky;
      top: 0;
      overflow: hidden;
      transition: width 0.22s ease;
    }

    .sidebar.collapsed { width: 64px; }

    /* Collapsed icon strip — one icon per category + sync icon */
    .sidebar-icon-strip {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 6px 0;
      flex: 1;
      overflow-y: auto;
    }

    .sidebar.collapsed .sidebar-icon-strip { display: flex; }
    .sidebar.collapsed .sidebar-inner { display: none; }

    .sidebar-icon-dot {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      flex-shrink: 0;
      cursor: pointer;
      border: 2px solid transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: border-color 0.15s, background 0.15s;
    }

    .sidebar-icon-dot.active { border-color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.1); }
    .sidebar-icon-dot:active { opacity: 0.7; }

    .sidebar-icon-dot[title]::after {
      content: attr(title);
      position: absolute;
      left: 52px;
      top: 50%;
      transform: translateY(-50%);
      background: #3d4e72;
      color: #fff;
      font-size: 0.78rem;
      padding: 4px 10px;
      border-radius: 6px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
      z-index: 50;
    }

    .sidebar-icon-sync {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #9badd4;
      font-size: 1.1rem;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.15s;
    }
    .sidebar-icon-sync:active { opacity: 0.7; }

    .sidebar-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 48px;
      flex-shrink: 0;
      background: none;
      border: none;
      color: #9badd4;
      cursor: pointer;
      font-size: 1.2rem;
      align-self: flex-end;
      transition: color 0.15s;
    }
    .sidebar-toggle:hover { color: #fff; }

    .sidebar-inner {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      padding: 0 0 0;
      min-width: 260px; /* keeps content from wrapping during animation */
    }

    .sidebar h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #9badd4;
      padding: 12px 20px 10px;
      margin: 0;
      white-space: nowrap;
    }

    .cat-list { list-style: none; flex: 1; overflow-y: auto; overflow-x: hidden; }

    .cat-list li {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      cursor: pointer;
      font-size: 0.92rem;
      color: #d6e0f5;
      min-height: 44px;
    }

    .cat-list li.active { background: #4f6ef7; color: #fff; font-weight: 600; }

    /* Subcategory items */
    .cat-list li.subcat {
      padding-left: 32px;
      font-size: 0.85rem;
    }

    .cat-action-btn {
      background: none;
      border: none;
      color: #9badd4;
      cursor: pointer;
      font-size: 0.9rem;
      padding: 4px 6px;
      line-height: 1;
      min-width: 28px;
      min-height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* Add-subcat button (inline on parent row) */
    .add-subcat-btn {
      background: none;
      border: none;
      color: #9badd4;
      cursor: pointer;
      font-size: 1rem;
      padding: 4px 6px;
      line-height: 1;
      min-width: 28px;
      min-height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .cat-icon {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .cat-icon:active { opacity: 0.6; }

    /* Subcat icon slightly smaller */
    .cat-list li.subcat .cat-icon {
      width: 16px;
      height: 16px;
      font-size: 0.72rem;
      border-radius: 4px;
    }

    /* Icon picker modal */
    .icon-picker-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 4px;
    }

    .icon-picker-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 10px 6px;
      border: 2px solid #dde1e7;
      border-radius: 10px;
      background: #f8f9fb;
      cursor: pointer;
      font-size: 1.4rem;
      min-height: 64px;
      transition: border-color 0.15s, background 0.15s;
    }

    .icon-picker-btn.selected { border-color: #4f6ef7; background: #eef1ff; }
    .icon-picker-btn span { font-size: 0.65rem; color: #777; }

    .color-picker-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 8px;
    }

    .color-swatch {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: border-color 0.15s, transform 0.1s;
    }

    .color-swatch.selected { border-color: #2d3a5c; transform: scale(1.15); }

    .cat-chip {
      flex-shrink: 0;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      border: 1px solid;
      white-space: nowrap;
    }

    .cat-count {
      margin-left: auto;
      font-size: 0.75rem;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 1px 7px;
    }

    .cat-list li.active .cat-count { background: rgba(255,255,255,0.25); }

    .add-cat-row input {
      width: 100%;
      padding: 7px 10px;
      border-radius: 6px;
      border: 1.5px solid #4e6092;
      background: #3d4e72;
      color: #fff;
      font-size: 0.85rem;
      outline: none;
    }

    .add-cat-row input::placeholder { color: #8898c0; }
    .add-cat-row input:focus { border-color: #4f6ef7; }

    .add-cat-btn {
      margin-top: 6px;
      width: 100%;
      padding: 7px;
      background: #4f6ef7;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    /* inline rename input */    .cat-rename-input {
      background: transparent;
      border: none;
      border-bottom: 1.5px solid #9badd4;
      color: #fff;
      font-size: 0.92rem;
      outline: none;
      flex: 1;
      min-width: 0;
      padding: 0 2px;
    }

    /* ── Sync toolbar ── */
    .data-toolbar {
      padding: 12px 16px 16px;
      margin-top: auto;
      border-top: 1px solid #3a4a68;
      background: #2d3a5c;
      position: sticky;
      bottom: 0;
      white-space: nowrap;
    }

    .data-btn {
      width: 100%;
      padding: 10px 8px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid #4e6092;
      background: #3d4e72;
      color: #d6e0f5;
      transition: background 0.15s, color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 44px;
    }

    .sync-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-left: 5px;
      background: #555;
      vertical-align: middle;
      flex-shrink: 0;
    }
    .sync-dot.connected  { background: #3bb87f; }
    .sync-dot.error      { background: #f5a623; }

    /* ── Main ── */
    .main {
      flex: 1;
      padding: 40px 32px;
      min-width: 0; /* allows flex child to shrink below content width */
    }

    .main-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .main-header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #2d3a5c;
    }

    .cat-badge {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Add task form ── */
    .add-form {
      background: #fff;
      border: 1.5px solid #dde1e7;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .add-form-row { display: flex; gap: 8px; }

    .add-form input[type="text"],
    .add-form input[type="number"] {
      padding: 10px 14px;
      border: 1.5px solid #dde1e7;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      background: #fff;
    }

    .add-form input[type="text"]:focus,
    .add-form input[type="number"]:focus { border-color: #4f6ef7; }

    .add-form input#new-task { flex: 1; }

    .cost-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .cost-row label {
      font-size: 0.82rem;
      color: #888;
      white-space: nowrap;
    }

    /* Independent toggle buttons — each can be on/off */
    .cost-toggles {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .cost-toggle-btn {
      padding: 10px 16px;
      border: 1.5px solid #dde1e7;
      border-radius: 8px;
      background: #fff;
      font-size: 0.9rem;
      cursor: pointer;
      color: #888;
      min-height: 44px;
      font-weight: 500;
    }

    .cost-toggle-btn.on {
      background: #4f6ef7;
      border-color: #4f6ef7;
      color: #fff;
      font-weight: 600;
    }

    .cost-inputs-wrap {
      display: flex;
      gap: 8px;
      align-items: center;
      flex: 1;
      flex-wrap: wrap;
    }

    .cost-input-group {
      position: relative;
      display: flex;
      align-items: center;
      gap: 4px;
      flex: 1;
      min-width: 90px;
    }

    .cost-input-group .cost-prefix {
      position: absolute;
      left: 10px;
      font-size: 0.85rem;
      color: #999;
      pointer-events: none;
    }

    .cost-input-group input {
      width: 100%;
      padding: 10px 14px 10px 22px;
      border: 1.5px solid #dde1e7;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .cost-input-group input.no-prefix { padding-left: 10px; }
    .cost-input-group input:focus { border-color: #4f6ef7; }

    .cost-input-group .cost-suffix {
      font-size: 0.82rem;
      color: #888;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .add-form-row button.add-btn {
      padding: 10px 18px;
      background: #4f6ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      min-height: 44px;
      white-space: nowrap;
    }


    /* ── Cost summary bar ── */
    .cost-summary {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      background: #fff;
      border: 1.5px solid #dde1e7;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 8px;
    }

    .owner-filter-row {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .owner-filter-btn {
      padding: 7px 14px;
      border: 1.5px solid #dde1e7;
      border-radius: 20px;
      background: #fff;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      color: #666;
      min-height: 36px;
    }

    .owner-filter-btn.active        { background: #2d3a5c; border-color: #2d3a5c; color: #fff; }
    .owner-filter-btn.active-zach   { background: #4f6ef7; border-color: #4f6ef7; color: #fff; }
    .owner-filter-btn.active-alana  { background: #c0397a; border-color: #c0397a; color: #fff; }
    .owner-filter-btn.active-none   { background: #888;    border-color: #888;    color: #fff; }

    .cost-summary-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      color: #444;
    }

    .cost-summary-item strong { color: #2d3a5c; }
    .cs-divider { width: 1px; height: 16px; background: #dde1e7; }

    /* ── Task list ── */
    ul.task-list { list-style: none; }

    ul.task-list li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0 10px 10px;
      border-bottom: 1px solid #f0f2f5;
      border-left: 3px solid transparent;
      transition: border-left-color 0.3s;
    }

    ul.task-list li:last-child { border-bottom: none; }

    ul.task-list li.priority-high   { border-left-color: var(--priority-high); }
    ul.task-list li.priority-medium { border-left-color: var(--priority-medium); }
    ul.task-list li.priority-low    { border-left-color: var(--priority-low); }

    ul.task-list li input[type="checkbox"] {
      width: 24px;
      height: 24px;
      accent-color: #4f6ef7;
      cursor: pointer;
      flex-shrink: 0;
    }

    .priority-pill {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      border: none;
    }

    .priority-pill:active { opacity: 0.7; }
    .priority-pill.high   { background: var(--priority-high); }
    .priority-pill.medium { background: var(--priority-medium); }
    .priority-pill.low    { background: var(--priority-low); }

    .task-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    ul.task-list li .text {
      font-size: 0.95rem;
      color: #2d2d2d;
      word-break: break-word;
    }

    ul.task-list li.done .text {
      text-decoration: line-through;
      color: #aaa;
    }

    .cost-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.75rem;
      color: #666;
      background: #f4f5f8;
      border-radius: 6px;
      padding: 2px 7px;
      width: fit-content;
    }

    .owner-chip {
      display: inline-flex;
      align-items: center;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      width: fit-content;
      letter-spacing: 0.02em;
    }
    .owner-chip.zach  { background: #e8eeff; color: #3a57d6; }
    .owner-chip.alana { background: #fce8f3; color: #c0397a; }

    /* Owner toggle buttons: unselected = tinted, selected = blue+white for both */
    #add-owner-zach,  #edit-owner-zach  { background: #e8eeff; border-color: #b0bfff; color: #3a57d6; }
    #add-owner-alana, #edit-owner-alana { background: #fce8f3; border-color: #f0b8d8; color: #c0397a; }
    #add-owner-zach.on,  #edit-owner-zach.on,
    #add-owner-alana.on, #edit-owner-alana.on {
      background: #4f6ef7; border-color: #4f6ef7; color: #fff;
    }

    /* Quick-select cost chips */
    .cost-quick-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .cost-quick-btn {
      padding: 10px 14px;
      border: 1.5px solid #dde1e7;
      border-radius: 8px;
      background: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      color: #555;
      min-height: 44px;
    }

    .cost-quick-btn.on {
      background: #4f6ef7;
      border-color: #4f6ef7;
      color: #fff;
    }

    .cost-other-input {
      flex: 1;
      min-width: 80px;
      padding: 7px 10px;
      border: 1.5px solid #dde1e7;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    .cost-other-input:focus { border-color: #4f6ef7; }

    .task-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
    }

    .task-actions { display: flex; gap: 4px; flex-shrink: 0; }

    .btn-icon {
      background: none;
      border: none;
      cursor: pointer;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      flex-shrink: 0;
      color: #bbb;
    }

    /* ── Edit modal ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 14px;
      padding: 28px 24px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .modal h2 { font-size: 1.1rem; font-weight: 700; color: #2d3a5c; }

    .modal label {
      font-size: 0.82rem;
      color: #666;
      display: block;
      margin-bottom: 5px;
    }

    .modal input[type="text"],
    .modal input[type="number"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #dde1e7;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .modal input:focus { border-color: #4f6ef7; }

    .modal-cost-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .modal-cost-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .modal-actions button {
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
      border: none;
      transition: background 0.2s;
    }

    .btn-cancel { background: #f0f2f5; color: #555; }
    .btn-save   { background: #4f6ef7; color: #fff; }
    .btn-delete-modal { background: #fff0f0; color: #e55; margin-right: auto; }

    .footer {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.82rem;
      color: #999;
    }

    .footer button {
      background: none;
      border: none;
      color: #e55;
      cursor: pointer;
      font-size: 0.82rem;
    }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 32px 0;
      font-size: 0.9rem;
    }

    /* ── Mobile ── */
    @media (max-width: 720px) {
      body { flex-direction: column; }

      /* Kill iOS auto-zoom: inputs must be ≥16px */
      input[type="text"], input[type="number"],
      .cost-other-input, .add-cat-row input,
      .cat-rename-input, .modal input { font-size: 16px !important; }

      /* Sidebar hidden at rest — shown as overlay when .mobile-open is toggled */
      .sidebar { display: none; }
      .sidebar-toggle { display: none; }
      .sidebar-icon-strip { display: none !important; }

      /* Lock body scroll when overlay is open — iOS Safari requires position:fixed */
      body.nav-open {
        overflow: hidden;
        position: fixed;
        width: 100%;
        /* top is set dynamically via JS to preserve scroll position */
      }

      /* Backdrop blocks all touch events on the page below */
      .mobile-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.4);
        z-index: 90;
        touch-action: none;
      }

      .mobile-backdrop.open { display: block; }

      .sidebar.mobile-open {
        display: flex;
        flex-direction: column;
        position: fixed;
        top: var(--mobile-header-h, 56px);
        left: 0; right: 0; bottom: 0;
        height: auto;
        width: 100%;
        /* dvh shrinks when the keyboard appears, preventing the white gap */
        max-height: calc(100dvh - var(--mobile-header-h, 56px));
        z-index: 100;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        transition: none;
      }

      .sidebar.mobile-open .sidebar-inner {
        display: flex;
        flex-direction: column;
        width: 100%;
        min-width: 0;
        padding: 8px 0 16px;
      }

      .sidebar h2 { display: none; }

      .sidebar.mobile-open .cat-list {
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
        overflow-y: visible;
      }

      .sidebar.mobile-open .cat-list li {
        border-radius: 0;
        padding: 14px 20px;
        white-space: normal;
        min-height: 52px;
        background: transparent;
        flex-shrink: unset;
        font-size: 1rem;
      }

      .sidebar.mobile-open .cat-list li.subcat { padding-left: 36px; font-size: 0.92rem; }
      .sidebar.mobile-open .cat-list li.active { background: #4f6ef7; }

      /* On mobile overlay: hide action buttons and drag handle by default */
      .sidebar.mobile-open .drag-handle,
      .sidebar.mobile-open .move-btn,
      .sidebar.mobile-open .cat-action-btn,
      .sidebar.mobile-open .add-subcat-btn { display: none; }

      /* Show them when manage mode is active */
      .sidebar.mobile-open.managing .drag-handle,
      .sidebar.mobile-open.managing .move-btn,
      .sidebar.mobile-open.managing .cat-action-btn,
      .sidebar.mobile-open.managing .add-subcat-btn { display: inline-flex; }

      /* Manage toggle button */
      .mobile-manage-btn {
        display: none;
        margin-left: auto;
        padding: 6px 12px;
        background: rgba(255,255,255,0.12);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 6px;
        color: #d6e0f5;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        flex-shrink: 0;
      }
      /* Show Manage button and give it a proper header row with padding */
      .sidebar.mobile-open .mobile-manage-btn { display: block; }
      .sidebar.mobile-open .sidebar-inner > div:first-child {
        padding: 14px 16px 10px;
        border-bottom: 1px solid #3a4a68;
        margin-bottom: 4px;
      }
      .sidebar.mobile-open.managing .mobile-manage-btn {
        background: #4f6ef7;
        border-color: #4f6ef7;
        color: #fff;
      }

      /* Ensure name fills available space and doesn't get squeezed */
      .sidebar.mobile-open .cat-list li .cat-name { font-size: inherit; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

      .sidebar.mobile-open .add-cat-row {
        padding: 8px 16px;
        display: flex;
        gap: 6px;
        align-items: center;
      }

      .sidebar.mobile-open .add-cat-row input { flex: 1; min-height: 44px; }
      .sidebar.mobile-open .add-cat-btn { margin-top: 0; width: auto; padding: 10px 16px; min-height: 44px; }

      .sidebar.mobile-open .data-toolbar {
        padding: 12px 16px 16px;
        margin-top: auto;
        border-top: 1px solid #3a4a68;
        position: static;
      }

      /* Title bar acts as the category picker trigger */
      .main-header {
        cursor: pointer;
        user-select: none;
        -webkit-user-select: none;
        margin-bottom: 14px;
        /* Break out of .main's 14px horizontal padding so the bar is full-width */
        margin-left: -14px;
        margin-right: -14px;
        margin-top: -14px;
        position: relative;
        padding: max(12px, env(safe-area-inset-top)) 16px 12px;
        background: #fff;
        border-bottom: 1.5px solid #dde1e7;
        display: flex;
        align-items: center;

      }

      .main-header::after {
        content: '▼';
        font-size: 0.7em;
        color: #888;
        margin-left: auto;
        flex-shrink: 0;
      }

      .main-header.open::after { content: '▲'; }

      .main-header h1 { font-size: 1.3rem; }


      .mobile-backdrop.open { display: block; }

      .main {
        padding: 14px 14px max(20px, env(safe-area-inset-bottom));
      }

      ul.task-list li { padding: 14px 0 14px 10px; gap: 12px; }
      ul.task-list li input[type="checkbox"] { width: 28px; height: 28px; }
      .priority-pill, .btn-icon { width: 48px; height: 48px; }

      .cost-toggle-btn { min-height: 48px; padding: 12px 18px; }
      .cost-quick-btn  { min-height: 48px; padding: 12px 16px; }
      .add-btn { min-height: 52px !important; padding: 14px 22px !important; font-size: 1rem !important; }

      .data-btn { min-height: 48px; font-size: 0.9rem; }

      .modal { padding: 22px 18px; padding-bottom: max(22px, env(safe-area-inset-bottom)); }
      .modal-actions button { padding: 14px 20px; min-height: 52px; }
    }

    /* ── Drag-to-reorder (desktop) ── */
    .cat-list li.drag-over-above { border-top: 2px solid #4f6ef7; }
    .cat-list li.drag-over-below { border-bottom: 2px solid #4f6ef7; }
    .cat-list li[draggable="true"] { cursor: grab; }
    .cat-list li.dragging { opacity: 0.4; }
    /* Arrow buttons hidden on desktop (drag handles are used there instead) */
    .move-btn { display: none; }

    /* Hidden globally; shown only inside mobile media query */
    .mobile-backdrop { display: none; }

    /* ── Inline add-subcategory row ── */
    .add-subcat-row {
      display: flex;
      gap: 6px;
      align-items: center;
      padding: 6px 20px 6px 32px;
      background: #263352;
    }
    .add-subcat-row input {
      flex: 1;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1.5px solid #4e6092;
      background: #3d4e72;
      color: #fff;
      font-size: 0.85rem;
      outline: none;
      min-height: 36px;
    }

    .add-subcat-row button {
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 36px;
    }
    .add-subcat-row .btn-subcat-save { background: #4f6ef7; color: #fff; }
    .add-subcat-row .btn-subcat-cancel { background: #3d4e72; color: #9badd4; }

</head>
<body>

  <nav class="sidebar" id="sidebar">
    <button class="sidebar-toggle" onclick="toggleSidebar()" id="sidebar-toggle" title="Toggle sidebar">☰</button>
    <!-- Collapsed icon strip (shown when sidebar is collapsed) -->
    <div class="sidebar-icon-strip" id="sidebar-icon-strip"></div>
    <div class="sidebar-inner">
      <div style="display:flex;align-items:center;padding:0 12px 0 0">

      <div class="data-toolbar">
        <button class="data-btn sync-btn" id="sync-btn" onclick="openSyncModal()" title="Cloud sync setup">☁ <span id="sync-label">Sync</span><span class="sync-dot" id="sync-dot"></span></button>
      </div>
    </div>
  </nav>

  <div class="main">
    <div class="main-header">
      <div class="cat-badge" id="cat-badge"></div>
      <h1 id="cat-title">All Tasks</h1>
    </div>

    <div class="add-form">
      <div class="add-form-row">
        <input id="new-task" type="text" placeholder="Add a new task..." />
        <button class="add-btn" onclick="addTask()">Add</button>
      </div>
      <div class="cost-row">
        <label>Owner:</label>
        <div class="cost-toggles">
          <button id="add-owner-zach"  class="cost-toggle-btn" onclick="setAddOwner('zach')">Zach</button>
          <button id="add-owner-alana" class="cost-toggle-btn" onclick="setAddOwner('alana')">Alana</button>
        </div>
      </div>
      <div class="cost-row">
        <label>Cost:</label>
        <div class="cost-toggles">
          <button id="add-toggle-money" class="cost-toggle-btn" onclick="toggleAddCost('money')">$</button>
          <button id="add-toggle-time"  class="cost-toggle-btn" onclick="toggleAddCost('time')">⏱</button>
        </div>
        <div class="cost-inputs-wrap" id="add-cost-inputs"></div>
      </div>
    </div>

    <div class="cost-summary" id="cost-summary" style="display:none"></div>

    <div class="owner-filter-row" id="owner-filter-row" style="display:none">
      <button id="ofilter-all"   class="owner-filter-btn active" onclick="setOwnerFilter(null,this)">All</button>
      <button id="ofilter-zach"  class="owner-filter-btn" onclick="setOwnerFilter('zach',this)">Zach</button>
      <button id="ofilter-alana" class="owner-filter-btn" onclick="setOwnerFilter('alana',this)">Alana</button>
      <button id="ofilter-none"  class="owner-filter-btn" onclick="setOwnerFilter('none',this)">No owner</button>
    </div>

    <ul class="task-list" id="task-list"></ul>
    <div class="footer">
      <span id="count"></span>
      <button onclick="clearDone()">Clear completed</button>
    </div>
  </div>

  <!-- Mobile category nav backdrop -->
  <div id="mobile-backdrop" class="mobile-backdrop"></div>

  <!-- Edit modal -->
  <div class="modal-backdrop" id="modal-backdrop" onclick="handleBackdropClick(event)">
    <div class="modal">
      <h2>Edit Task</h2>
      <div>
        <label for="edit-text">Task</label>
        <input id="edit-text" type="text" maxlength="200" />
      </div>
      <div class="modal-cost-section">
        <label>Owner</label>
        <div class="modal-cost-row">
          <div class="cost-toggles">
            <button id="edit-owner-zach"  class="cost-toggle-btn" onclick="setEditOwner('zach')">Zach</button>
            <button id="edit-owner-alana" class="cost-toggle-btn" onclick="setEditOwner('alana')">Alana</button>
          </div>
        </div>
      </div>
      <div class="modal-cost-section">
        <label>Cost</label>
        <div class="modal-cost-row">
          <div class="cost-toggles">
            <button id="edit-toggle-money" class="cost-toggle-btn" onclick="toggleEditCost('money')">$</button>
            <button id="edit-toggle-time"  class="cost-toggle-btn" onclick="toggleEditCost('time')">⏱</button>
          </div>
          <div class="cost-inputs-wrap" id="edit-cost-inputs"></div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-delete-modal" onclick="deleteEditingTask()">Delete</button>
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="saveEdit()">Save</button>
      </div>
    </div>
  </div>

  <!-- Icon picker modal -->
  <div class="modal-backdrop" id="icon-modal-backdrop" onclick="handleIconBackdropClick(event)">
    <div class="modal" style="max-width:360px">
      <h2>Category Style</h2>
      <div>
        <label style="font-size:0.82rem;color:#666;display:block;margin-bottom:8px">Icon</label>
        <div class="icon-picker-grid" id="icon-picker-grid"></div>
      </div>
      <div>
        <label style="font-size:0.82rem;color:#666;display:block;margin-bottom:8px">Color</label>
        <div class="color-picker-row" id="color-picker-row"></div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeIconModal()">Cancel</button>
        <button class="btn-save" onclick="saveIconModal()">Save</button>
      </div>
    </div>
  </div>

  <!-- Sync modal -->
  <div class="modal-backdrop" id="sync-modal-backdrop" onclick="handleSyncBackdropClick(event)">
    <div class="modal" id="sync-modal">
      <h2>☁ Cloud Sync</h2>
      <div id="sync-disconnected-view">
        <p style="font-size:0.88rem;color:#666;line-height:1.5;margin-bottom:12px">Connect to your Firebase database so you and your wife share the same list in real time.</p>
        <label for="firebase-input" style="font-size:0.82rem;color:#666;display:block;margin-bottom:5px">Firebase Config (JSON)</label>
        <textarea id="firebase-input" rows="5" placeholder='{"apiKey":"...","databaseURL":"...","projectId":"..."}' style="font-size:13px;width:100%;padding:10px 14px;border:1.5px solid #dde1e7;border-radius:8px;outline:none;margin-bottom:4px;resize:vertical;font-family:monospace"></textarea>
        <p id="sync-error" style="font-size:0.8rem;color:#e55;min-height:18px;margin-bottom:8px"></p>
      </div>
      <div id="sync-connected-view" style="display:none">
        <p style="font-size:0.88rem;color:#3bb87f;font-weight:600;margin-bottom:8px">✓ Connected to Firebase</p>
        <p style="font-size:0.82rem;color:#666;margin-bottom:4px">Project:</p>
        <code id="sync-id-display" style="font-size:0.78rem;color:#444;word-break:break-all;background:#f4f5f8;padding:6px 10px;border-radius:6px;display:block;margin-bottom:12px"></code>
        <p id="sync-status-text" style="font-size:0.82rem;color:#888;margin-bottom:12px"></p>
      </div>
      <div class="modal-actions" id="sync-modal-actions"></div>
    </div>
  </div>

  <!-- Firebase SDK (loaded only after user connects) -->
  <script id="firebase-app-script"></script>

  <!-- Sync toast -->
  <div id="sync-toast" style="position:fixed;top:max(12px,env(safe-area-inset-top,12px));right:12px;background:#2d3a5c;color:#fff;font-size:0.82rem;font-weight:600;padding:8px 14px;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.18);opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:200">✓ List updated</div>

  <script>
    const PALETTE = [
      '#4f6ef7','#e0674a','#3bb87f','#f5a623','#9b59b6',
      '#1abc9c','#e74c3c','#2ecc71','#3498db','#f39c12'
    ];

    const PRIORITY_CYCLE = { high: 'low', medium: 'high', low: 'medium' };
    const PRIORITY_ORDER = { high: 0, medium: 1, low: 2 };
    const PRIORITY_ICON = {
      high:   '<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 4l-8 8h5v8h6v-8h5z"/></svg>',
      medium: '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="8" x2="19" y2="8"/><line x1="5" y1="14" x2="19" y2="14"/></svg>',
      low:    '<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 20l8-8h-5V4h-6v8H4z"/></svg>',
    };

    function uid() { return Date.now() + '-' + Math.random().toString(36).slice(2, 8); }

    const MONEY_ICON = '<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M9.5 9.5a2.5 2 0 0 1 5 0c0 1.5-2.5 2-2.5 2s2.5.5 2.5 2a2.5 2 0 0 1-5 0"/></svg>';
    const TIME_ICON  = '<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>';

    let state = JSON.parse(localStorage.getItem('todo-state') || 'null') || {
      categories: [{ id: 'default', name: 'General', color: PALETTE[0] }],
      tasks: [],
    };

    // migrate existing tasks
    state.tasks = state.tasks.map(t => {
      const showMoney = t.costType === 'money' || t.costType === 'both';
      const showTime  = t.costType === 'time'  || t.costType === 'both';
      return {
        ...t,
        priority:  t.priority  || 'medium',
        cost:      t.cost      ?? null,
        costTime:  t.costTime  ?? null,
        showMoney: t.showMoney ?? showMoney,
        showTime:  t.showTime  ?? showTime,
      };
    });

    // migrate categories that predate parentId, icon, color
    state.categories = state.categories.map(c => ({
      parentId: null,
      icon: 'circle',
      color: c.color || PALETTE[0],
      ...c,
    }));

    let activeCategory = 'all';
    let editingId = null;

    // Add-form cost state
    let addShowMoney = false;
    let addShowTime  = false;
    let addOwner     = null; // null | 'zach' | 'alana'

    // Edit-modal cost state
    let editShowMoney = false;
    let editShowTime  = false;
    let editOwner     = null;

    let ownerFilter   = null; // null = all, 'zach', 'alana', 'none'

    // Priority sort debounce — keeps tasks in place briefly after cycling
    let sortTimer = null;
    let frozenOrder = null; // array of task IDs in current display order

    // Cloud sync state
    let firebaseConfig = null;
    try { firebaseConfig = JSON.parse(localStorage.getItem('firebase-config') || 'null'); } catch {}
    let firebaseDb      = null;  // Firebase database instance
    let firebaseRef     = null;  // Reference to /todolist node
    let syncListener    = null;  // onValue unsubscribe fn
    let pushInFlight    = false;
    let syncPending     = false;
    let lastSyncOk      = null;  // null = never, true = ok, false = error

    function save() {
      state.tasks = deduplicateTasks(state.tasks);
      state.lastModified = Date.now();
      localStorage.setItem('todo-state', JSON.stringify(state));
      syncPush();
    }
    function render() { renderSidebar(); renderTasks(); }
    function nextColor() { return PALETTE[state.categories.length % PALETTE.length]; }

    /* ── Category icon system ── */
    const CAT_ICONS = [
      { id: 'circle', label: 'Dot',     svg: '<circle cx="12" cy="12" r="6" fill="currentColor"/>' },
      { id: 'cart',   label: 'Grocery', svg: '<path stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none" d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0"/>' },
      { id: 'box',    label: 'Box',     svg: '<path stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none" d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 002 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16zM3.27 6.96L12 12.01l8.73-5.05M12 22.08V12"/>' },
      { id: 'home',   label: 'Home',    svg: '<path stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none" d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2zM9 22V12h6v10"/>' },
      { id: 'star',   label: 'Star',    svg: '<polygon stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none" points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>' },
      { id: 'list',   label: 'List',    svg: '<path stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none" d="M9 6h11M9 12h11M9 18h11M4 6h.01M4 12h.01M4 18h.01"/>' },
      { id: 'tools',  label: 'Tools',   svg: '<path stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none" d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/>' },
      { id: 'heart',  label: 'Heart',   svg: '<path stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none" d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>' },
    ];

    const CAT_COLORS = ['#4f6ef7','#e53935','#3bb87f','#f5a623','#9b59b6','#e8622a'];

    function catSVG(iconId, size) {
      const icon = CAT_ICONS.find(i => i.id === iconId) || CAT_ICONS[0];
      return `<svg viewBox="0 0 24 24" width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg">${icon.svg}</svg>`;
    }

    function catIconHTML(c, size) {
      const px = size === 'small' ? 14 : 18;
      return `<span class="cat-icon" style="color:${c.color};flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;width:${px+4}px;height:${px+4}px;cursor:pointer" onclick="event.stopPropagation();openIconModal('${c.id}')" title="Change style">${catSVG(c.icon || 'circle', px)}</span>`;
    }

    /* Icon picker state */
    let iconModalCatId = null;
    let iconModalIcon  = 'circle';
    let iconModalColor = CAT_COLORS[0];

    function openIconModal(catId) {
      const cat = state.categories.find(c => c.id === catId);
      if (!cat) return;
      iconModalCatId = catId;
      iconModalIcon  = cat.icon  || 'circle';
      iconModalColor = cat.color || CAT_COLORS[0];
      renderIconPicker();
      document.getElementById('icon-modal-backdrop').classList.add('open');
    }

    function renderIconPicker() {
      const grid = document.getElementById('icon-picker-grid');
      grid.innerHTML = CAT_ICONS.map(i => `
        <button class="icon-picker-btn ${iconModalIcon === i.id ? 'selected' : ''}"
          onclick="selectIconChoice('${i.id}', this)"
          style="color:${iconModalColor}">
          ${catSVG(i.id, 26)}
          <span>${i.label}</span>
        </button>
      `).join('');

      const row = document.getElementById('color-picker-row');
      row.innerHTML = CAT_COLORS.map(c => `
        <div class="color-swatch ${iconModalColor === c ? 'selected' : ''}"
          style="background:${c}" onclick="selectColorChoice('${c}', this)"></div>
      `).join('');
    }

    function selectIconChoice(iconId, btn) {
      iconModalIcon = iconId;
      document.querySelectorAll('.icon-picker-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    }

    function selectColorChoice(color, swatch) {
      iconModalColor = color;
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      swatch.classList.add('selected');
      // Update icon buttons to preview new color
      document.querySelectorAll('.icon-picker-btn').forEach(b => b.style.color = color);
    }

    function closeIconModal() {
      document.getElementById('icon-modal-backdrop').classList.remove('open');
      iconModalCatId = null;
    }

    function handleIconBackdropClick(e) {
      if (e.target === document.getElementById('icon-modal-backdrop')) closeIconModal();
    }

    function saveIconModal() {
      const cat = state.categories.find(c => c.id === iconModalCatId);
      if (cat) { cat.icon = iconModalIcon; cat.color = iconModalColor; }
      save();
      closeIconModal();
      render();
    }

    /* ── Owner helpers ── */
    function setAddOwner(val) {
      // Toggle off if already selected
      addOwner = addOwner === val ? null : val;
      ['zach','alana'].forEach(o => {
        const btn = document.getElementById('add-owner-' + o);
        if (btn) btn.classList.toggle('on', addOwner === o);
      });
    }

    function setEditOwner(val) {
      // Toggle off if already selected
      editOwner = editOwner === val ? null : val;
      ['zach','alana'].forEach(o => {
        const btn = document.getElementById('edit-owner-' + o);
        if (btn) btn.classList.toggle('on', editOwner === o);
      });
    }

    function initEditOwner(val) {
      editOwner = val;
      ['zach','alana'].forEach(o => {
        const btn = document.getElementById('edit-owner-' + o);
        if (btn) btn.classList.toggle('on', val === o);
      });
    }

    function setOwnerFilter(val, btn) {
      ownerFilter = val;
      // Reset all button classes
      document.getElementById('ofilter-all').className   = 'owner-filter-btn' + (val === null   ? ' active'       : '');
      document.getElementById('ofilter-zach').className  = 'owner-filter-btn' + (val === 'zach' ? ' active-zach'  : '');
      document.getElementById('ofilter-alana').className = 'owner-filter-btn' + (val === 'alana'? ' active-alana' : '');
      document.getElementById('ofilter-none').className  = 'owner-filter-btn' + (val === 'none' ? ' active-none'  : '');
      renderTasks();
    }

    function updateOwnerFilterVisibility(tasks) {
      const hasOwners = tasks.some(t => t.owner);
      document.getElementById('owner-filter-row').style.display = hasOwners ? 'flex' : 'none';
    }

    /* ── Cost quick-select helpers ── */
    const MONEY_PRESETS = [20, 50, 100, 200];
    const TIME_PRESETS  = [{ label: '30m', val: 0.5 }, { label: '1hr', val: 1 }, { label: '2hr', val: 2 }];

    function makeCostQuickRow(idPrefix, type) {
      // type: 'money' | 'time'
      const row = document.createElement('div');
      row.className = 'cost-quick-row';

      const presets = type === 'money' ? MONEY_PRESETS : TIME_PRESETS;

      presets.forEach(p => {
        const val   = type === 'money' ? p : p.val;
        const label = type === 'money' ? `$${p}` : p.label;
        const btn = document.createElement('button');
        btn.className = 'cost-quick-btn';
        btn.type = 'button';
        btn.textContent = label;
        btn.dataset.val = val;
        btn.onclick = () => selectCostPreset(idPrefix, type, val, btn);
        row.appendChild(btn);
      });

      // "Other" input
      const inp = document.createElement('input');
      inp.id = idPrefix + '-other';
      inp.className = 'cost-other-input';
      inp.inputMode = 'decimal'; // numeric pad on iOS, allows decimals
      inp.placeholder = type === 'money' ? 'Other $' : 'Other hrs';
      inp.addEventListener('focus', () => {
        // deselect preset buttons when user types custom
        row.querySelectorAll('.cost-quick-btn').forEach(b => b.classList.remove('on'));
        inp.style.borderColor = '#4f6ef7';
      });
      inp.addEventListener('blur', () => inp.style.borderColor = '#dde1e7');
      row.appendChild(inp);

      return row;
    }

    function selectCostPreset(idPrefix, type, val, clickedBtn) {
      const row = clickedBtn.closest('.cost-quick-row');
      row.querySelectorAll('.cost-quick-btn').forEach(b => b.classList.remove('on'));
      clickedBtn.classList.add('on');
      // clear the other input
      const other = document.getElementById(idPrefix + '-other');
      if (other) other.value = '';
    }

    function getCostValue(idPrefix) {
      // Check if a preset is selected
      const wrap = document.getElementById(idPrefix + '-wrap');
      if (!wrap) return null;
      const active = wrap.querySelector('.cost-quick-btn.on');
      if (active) return parseFloat(active.dataset.val);
      const other = document.getElementById(idPrefix + '-other');
      if (other && other.value.trim()) {
        const v = parseFloat(other.value);
        return (!isNaN(v) && v >= 0) ? v : null;
      }
      return null;
    }

    function renderAddCostInputs() {
      const wrap = document.getElementById('add-cost-inputs');
      wrap.innerHTML = '';
      if (addShowMoney) {
        const div = document.createElement('div');
        div.id = 'add-money-wrap';
        div.appendChild(makeCostQuickRow('add-money', 'money'));
        wrap.appendChild(div);
      }
      if (addShowTime) {
        const div = document.createElement('div');
        div.id = 'add-time-wrap';
        div.appendChild(makeCostQuickRow('add-time', 'time'));
        wrap.appendChild(div);
      }
    }

    function renderEditCostInputs() {
      const wrap = document.getElementById('edit-cost-inputs');
      wrap.innerHTML = '';
      if (editShowMoney) {
        const div = document.createElement('div');
        div.id = 'edit-money-wrap';
        div.appendChild(makeCostQuickRow('edit-money', 'money'));
        wrap.appendChild(div);
      }
      if (editShowTime) {
        const div = document.createElement('div');
        div.id = 'edit-time-wrap';
        div.appendChild(makeCostQuickRow('edit-time', 'time'));
        wrap.appendChild(div);
      }
    }

    function toggleAddCost(type) {
      if (type === 'money') addShowMoney = !addShowMoney;
      else                  addShowTime  = !addShowTime;
      document.getElementById('add-toggle-money').classList.toggle('on', addShowMoney);
      document.getElementById('add-toggle-time').classList.toggle('on', addShowTime);
      renderAddCostInputs();
    }

    function toggleEditCost(type) {
      if (type === 'money') editShowMoney = !editShowMoney;
      else                  editShowTime  = !editShowTime;
      document.getElementById('edit-toggle-money').classList.toggle('on', editShowMoney);
      document.getElementById('edit-toggle-time').classList.toggle('on', editShowTime);
      renderEditCostInputs();
    }

    function setEditCostState(showMoney, showTime) {
      editShowMoney = showMoney;
      editShowTime  = showTime;
      document.getElementById('edit-toggle-money').classList.toggle('on', showMoney);
      document.getElementById('edit-toggle-time').classList.toggle('on', showTime);
      renderEditCostInputs();
    }

    function getAddCostValues() {
      return {
        cost:      addShowMoney ? getCostValue('add-money') : null,
        costTime:  addShowTime  ? getCostValue('add-time')  : null,
        showMoney: addShowMoney,
        showTime:  addShowTime,
      };
    }

    function getEditCostValues() {
      return {
        cost:      editShowMoney ? getCostValue('edit-money') : null,
        costTime:  editShowTime  ? getCostValue('edit-time')  : null,
        showMoney: editShowMoney,
        showTime:  editShowTime,
      };
    }

    /* ── Categories ── */
    function addCategory() {
      const input = document.getElementById('new-cat');
      const name = input.value.trim();
      if (!name) return;
      state.categories.push({ id: 'cat-' + uid(), name, color: nextColor(), icon: 'circle', parentId: null });
      input.value = '';
      save();
      renderSidebar();
    }

    let addingSubcatFor = null; // parentId currently showing inline input

    function addSubCategory(parentId) {
      addingSubcatFor = parentId;
      renderSidebar();
      // Focus the input after render
      setTimeout(() => {
        const inp = document.getElementById('new-subcat-input');
        if (inp) inp.focus();
      }, 30);
    }

    function commitSubcat(parentId) {
      const inp = document.getElementById('new-subcat-input');
      const name = inp ? inp.value.trim() : '';
      addingSubcatFor = null;
      if (!name) { renderSidebar(); return; }
      const parent = state.categories.find(c => c.id === parentId);
      state.categories.push({
        id: 'cat-' + uid(),
        name,
        color: parent ? parent.color : nextColor(),
        icon: parent ? (parent.icon || 'circle') : 'circle',
        parentId,
      });
      save();
      renderSidebar();
    }

    function cancelSubcat() {
      addingSubcatFor = null;
      renderSidebar();
    }

    function deleteCategory(id) {
      // also delete subcategories
      const toDelete = new Set([id, ...state.categories.filter(c => c.parentId === id).map(c => c.id)]);
      if (state.categories.filter(c => !toDelete.has(c.id)).length === 0) return; // keep at least one
      const taskCount = state.tasks.filter(t => toDelete.has(t.category)).length;
      const cat = state.categories.find(c => c.id === id);
      const hasSubcats = state.categories.some(c => c.parentId === id);
      let msg = `Delete "${cat?.name}"?`;
      if (hasSubcats) msg += ' (and its subcategories)';
      if (taskCount > 0) msg += `\n\nThis will permanently delete ${taskCount} task${taskCount !== 1 ? 's' : ''}.`;
      if (!confirm(msg)) return;
      state.categories = state.categories.filter(c => !toDelete.has(c.id));
      state.tasks = state.tasks.filter(t => !toDelete.has(t.category));
      if (toDelete.has(activeCategory)) activeCategory = 'all';
      save();
      render();
    }

    function selectCategory(id) {
      activeCategory = id;
      frozenOrder = null;
      clearTimeout(sortTimer);
      render();
      closeMobileNav();
    }
    function addTask() {
      const textEl = document.getElementById('new-task');
      const text = textEl.value.trim();
      if (!text) return;
      const { cost, costTime, showMoney, showTime } = getAddCostValues();
      const category = activeCategory === 'all'
        ? (state.categories.find(c => !c.parentId)?.id || 'default')
        : activeCategory;
      const newTask = { id: uid(), text, done: false, category, priority: 'medium', cost, costTime, showMoney, showTime, owner: addOwner };
      state.tasks.push(newTask);
      textEl.value = '';
      // reset cost quick-selects
      document.querySelectorAll('#add-cost-inputs .cost-quick-btn').forEach(b => b.classList.remove('on'));
      document.querySelectorAll('#add-cost-inputs .cost-other-input').forEach(i => i.value = '');
      frozenOrder = null;
      save();
      render();
      // Scroll the new task into view
      const list = document.getElementById('task-list');
      if (list.lastElementChild && list.lastElementChild.tagName === 'LI') {
        list.lastElementChild.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    function toggleTask(id) {
      const t = state.tasks.find(t => t.id === id);
      if (t) t.done = !t.done;
      save();
      render();
    }

    function cyclePriority(id) {
      const t = state.tasks.find(t => t.id === id);
      if (!t) return;
      t.priority = PRIORITY_CYCLE[t.priority] || 'medium';
      save();

      // Capture current display order on first click of a cycle session
      if (!frozenOrder) {
        frozenOrder = getVisibleTasks(true).map(t => t.id);
      }

      // Re-render in frozen order (only priority pill + border updates in place)
      renderTasksInOrder(frozenOrder);

      // Schedule a re-sort after 1.5 s; reset if clicked again before it fires
      clearTimeout(sortTimer);
      sortTimer = setTimeout(() => {
        frozenOrder = null;
        sortTimer = null;
        renderTasks();
      }, 1500);
    }

    function deleteTask(id) {
      state.tasks = state.tasks.filter(t => t.id !== id);
      frozenOrder = null;
      save();
      render();
    }

    function clearDone() {
      const toRemove = state.tasks.filter(t => {
        if (!t.done) return false;
        if (activeCategory === 'all') return true;
        return t.category === activeCategory;
      });
      if (toRemove.length === 0) return;
      if (!confirm(`Remove ${toRemove.length} completed task${toRemove.length !== 1 ? 's' : ''}?`)) return;
      const removeIds = new Set(toRemove.map(t => t.id));
      state.tasks = state.tasks.filter(t => !removeIds.has(t.id));
      frozenOrder = null;
      save();
      render();
    }

    /* ── Edit modal ── */
    function openEdit(id) {
      const t = state.tasks.find(t => t.id === id);
      if (!t) return;
      editingId = id;
      document.getElementById('edit-text').value = t.text;
      initEditOwner(t.owner || null);
      setEditCostState(!!t.showMoney, !!t.showTime);
      setTimeout(() => {
        // Restore cost values — try to match a preset first, else put in "other" input
        if (t.showMoney && t.cost != null) restoreCostValue('edit-money', 'money', t.cost);
        if (t.showTime  && t.costTime != null) restoreCostValue('edit-time', 'time', t.costTime);
      }, 0);
      document.getElementById('modal-backdrop').classList.add('open');
      setTimeout(() => document.getElementById('edit-text').focus(), 50);
    }

    function restoreCostValue(idPrefix, type, val) {
      const wrap = document.getElementById(idPrefix + '-wrap');
      if (!wrap) return;
      const presetVals = type === 'money' ? MONEY_PRESETS : TIME_PRESETS.map(p => p.val);
      const matchBtn = Array.from(wrap.querySelectorAll('.cost-quick-btn'))
        .find(b => parseFloat(b.dataset.val) === val);
      if (matchBtn) {
        matchBtn.classList.add('on');
      } else {
        const other = document.getElementById(idPrefix + '-other');
        if (other) other.value = val;
      }
    }

    function closeModal() {
      document.getElementById('modal-backdrop').classList.remove('open');
      editingId = null;
    }

    function handleBackdropClick(e) {
      if (e.target === document.getElementById('modal-backdrop')) closeModal();
    }

    function saveEdit() {
      if (!editingId) return;
      const t = state.tasks.find(t => t.id === editingId);
      if (!t) return;
      const text = document.getElementById('edit-text').value.trim();
      if (!text) return;
      const { cost, costTime, showMoney, showTime } = getEditCostValues();
      t.text = text; t.cost = cost; t.costTime = costTime;
      t.showMoney = showMoney; t.showTime = showTime; t.owner = editOwner;
      save();
      closeModal();
      render();
    }

    function deleteEditingTask() {
      if (!editingId) return;
      deleteTask(editingId);
      closeModal();
    }

    /* ── Formatting ── */
    function fmtMoney(v) {
      if (v == null) return null;
      return v % 1 === 0 ? `$${v}` : `$${v.toFixed(2)}`;
    }

    function fmtTime(v) {
      if (v == null) return null;
      if (v < 1) return `${Math.round(v * 60)}m`;
      return v % 1 === 0 ? `${v}h` : `${v.toFixed(1)}h`;
    }

    function buildCostBadge(t) {
      const parts = [];
      if (t.showMoney && t.cost     != null) parts.push(`${MONEY_ICON}${fmtMoney(t.cost)}`);
      if (t.showTime  && t.costTime != null) parts.push(`${TIME_ICON}${fmtTime(t.costTime)}`);
      if (!parts.length) return '';
      return `<span class="cost-badge">${parts.join('<span style="margin:0 3px;color:#ccc">·</span>')}</span>`;
    }

    /* ── Render helpers ── */
    function getVisibleTasks(sorted) {
      // When a top-level category is selected, include its subcategory tasks too
      let ids = null;
      if (activeCategory !== 'all') {
        const cat = state.categories.find(c => c.id === activeCategory);
        if (cat && !cat.parentId) {
          // top-level: include self + all children
          ids = new Set([activeCategory, ...state.categories.filter(c => c.parentId === activeCategory).map(c => c.id)]);
        } else {
          ids = new Set([activeCategory]);
        }
      }
      const tasks = state.tasks.filter(t => {
        if (ids && !ids.has(t.category)) return false;
        if (ownerFilter === 'zach')  return t.owner === 'zach';
        if (ownerFilter === 'alana') return t.owner === 'alana';
        if (ownerFilter === 'none')  return !t.owner;
        return true;
      });
      if (sorted) tasks.sort((a, b) => PRIORITY_ORDER[a.priority || 'medium'] - PRIORITY_ORDER[b.priority || 'medium']);
      return tasks;
    }

    function renderSummary(tasks) {
      const el = document.getElementById('cost-summary');
      const hasMoney = tasks.some(t => t.showMoney && t.cost     != null);
      const hasTime  = tasks.some(t => t.showTime  && t.costTime != null);
      if (!hasMoney && !hasTime) { el.style.display = 'none'; return; }
      el.style.display = 'flex';

      const totalMoney = tasks.reduce((s, t) => t.showMoney && t.cost     != null ? s + t.cost     : s, 0);
      const totalTime  = tasks.reduce((s, t) => t.showTime  && t.costTime != null ? s + t.costTime : s, 0);
      const doneMoney  = tasks.filter(t => t.done).reduce((s, t) => t.showMoney && t.cost     != null ? s + t.cost     : s, 0);
      const doneTime   = tasks.filter(t => t.done).reduce((s, t) => t.showTime  && t.costTime != null ? s + t.costTime : s, 0);

      const items = [];
      if (hasMoney) items.push(`<span class="cost-summary-item">${MONEY_ICON}&nbsp;<span>Total: <strong>${fmtMoney(totalMoney)}</strong></span><span style="font-size:0.75rem;color:#aaa;margin-left:4px">(${fmtMoney(doneMoney)} done)</span></span>`);
      if (hasMoney && hasTime) items.push(`<span class="cs-divider"></span>`);
      if (hasTime)  items.push(`<span class="cost-summary-item">${TIME_ICON}&nbsp;<span>Total: <strong>${fmtTime(totalTime)}</strong></span><span style="font-size:0.75rem;color:#aaa;margin-left:4px">(${fmtTime(doneTime)} done)</span></span>`);
      el.innerHTML = items.join('');
    }

    function taskHTML(t) {
      const cat = state.categories.find(c => c.id === t.category);
      const parent = cat?.parentId ? state.categories.find(c => c.id === cat.parentId) : null;

      // Show cat chip in "All Tasks" view (full parent › sub label)
      // OR when viewing a top-level category and the task is in a subcategory
      const showChip = (activeCategory === 'all') ||
                       (parent && activeCategory === parent.id);

      const chipCat   = showChip ? cat : null;
      const chipLabel = chipCat
        ? (parent && activeCategory !== 'all'
            ? escHtml(cat.name)                          // viewing parent → show just subcat name
            : (parent
                ? `${escHtml(parent.name)} › ${escHtml(cat.name)}`  // all-tasks → show full path
                : escHtml(cat.name)))
        : '';

      const catChip = chipCat
        ? `<span class="cat-chip" style="background:${chipCat.color}20;color:${chipCat.color};border-color:${chipCat.color}50;display:inline-flex;align-items:center;gap:4px">${chipCat.icon && chipCat.icon !== 'circle' ? catSVG(chipCat.icon, 10) : ''} ${chipLabel}</span>`
        : '';
      const costChip = buildCostBadge(t);
      const ownerChip = t.owner
        ? `<span class="owner-chip ${t.owner}">${t.owner === 'zach' ? 'Zach' : 'Alana'}</span>`
        : '';
      const p = t.priority || 'medium';
      return `
        <li class="${t.done ? 'done' : ''} priority-${p}">
          <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask('${t.id}')">
          <button class="priority-pill ${p}" onclick="cyclePriority('${t.id}')" title="${p.charAt(0).toUpperCase()+p.slice(1)} priority — click to change">${PRIORITY_ICON[p]}</button>
          <div class="task-body">
            <span class="text">${escHtml(t.text)}</span>
            ${(catChip || costChip || ownerChip) ? `<div class="task-chips">${ownerChip}${catChip}${costChip}</div>` : ''}
          </div>
          <div class="task-actions">
            <button class="btn-icon edit-btn" onclick="openEdit('${t.id}')" title="Edit task">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
          </div>
        </li>`;
    }

    function renderTasks() {
      const list = document.getElementById('task-list');
      const visible = getVisibleTasks(true);
      // Pass all tasks in current category (ignoring owner filter) to determine whether to show the filter row
      const all = getVisibleTasksUnfiltered();
      updateOwnerFilterVisibility(all);
      frozenOrder = visible.map(t => t.id);
      renderSummary(visible);
      list.innerHTML = visible.length ? visible.map(taskHTML).join('') : '<li class="empty">No tasks here.</li>';
      updateCount(visible);
    }

    function getVisibleTasksUnfiltered() {
      let ids = null;
      if (activeCategory !== 'all') {
        const cat = state.categories.find(c => c.id === activeCategory);
        if (cat && !cat.parentId) {
          ids = new Set([activeCategory, ...state.categories.filter(c => c.parentId === activeCategory).map(c => c.id)]);
        } else {
          ids = new Set([activeCategory]);
        }
      }
      return state.tasks.filter(t => !ids || ids.has(t.category));
    }

    function renderTasksInOrder(order) {
      const list = document.getElementById('task-list');
      const taskMap = Object.fromEntries(state.tasks.map(t => [t.id, t]));
      let ids = null;
      if (activeCategory !== 'all') {
        const cat = state.categories.find(c => c.id === activeCategory);
        if (cat && !cat.parentId) {
          ids = new Set([activeCategory, ...state.categories.filter(c => c.parentId === activeCategory).map(c => c.id)]);
        } else {
          ids = new Set([activeCategory]);
        }
      }
      const visible = order.map(id => taskMap[id]).filter(Boolean)
        .filter(t => !ids || ids.has(t.category));
      renderSummary(visible);
      list.innerHTML = visible.length ? visible.map(taskHTML).join('') : '<li class="empty">No tasks here.</li>';
      updateCount(visible);
    }

    function updateCount(visible) {
      const remaining = visible.filter(t => !t.done).length;
      document.getElementById('count').textContent =
        `${remaining} item${remaining !== 1 ? 's' : ''} left`;
    }

    /* ── Category reorder ── */
    function moveCat(id, dir) {
      const cats = state.categories;
      const idx = cats.findIndex(c => c.id === id);
      if (idx === -1) return;
      const cat = cats[idx];
      // Build the ordered list of siblings (same parentId group)
      const siblings = cats
        .map((c, i) => ({ c, i }))
        .filter(({ c }) => c.parentId === cat.parentId);
      const sibPos = siblings.findIndex(({ c }) => c.id === id);
      const swapWith = siblings[sibPos + dir];
      if (!swapWith) return; // already at boundary
      // Swap positions in the real array
      cats[idx] = cats[swapWith.i];
      cats[swapWith.i] = cat;
      state.categories = cats;
      save();
      renderSidebar();
    }

    function initCatDrag(list) {
      let draggingId  = null;
      let draggingIsSubcat = false;
      let draggingParentId = null;

      function clearIndicators() {
        list.querySelectorAll('.drag-over-above,.drag-over-below').forEach(el => {
          el.classList.remove('drag-over-above', 'drag-over-below');
        });
      }

      function getDropTarget(e) {
        const items = Array.from(list.querySelectorAll('li[data-cat-id]'));
        for (const item of items) {
          const rect = item.getBoundingClientRect();
          if (e.clientY >= rect.top && e.clientY <= rect.bottom) {
            const mid = rect.top + rect.height / 2;
            return { el: item, above: e.clientY < mid };
          }
        }
        return null;
      }

      function commitReorder(targetId, above) {
        if (!draggingId || draggingId === targetId) return;
        const cats = state.categories;
        const dragIdx = cats.findIndex(c => c.id === draggingId);
        if (dragIdx === -1) return;
        const [moved] = cats.splice(dragIdx, 1);
        const targetIdx = cats.findIndex(c => c.id === targetId);
        if (targetIdx === -1) { cats.push(moved); }
        else { cats.splice(above ? targetIdx : targetIdx + 1, 0, moved); }
        state.categories = cats;
        save();
        renderSidebar();
      }

      list.querySelectorAll('li[data-cat-id]').forEach(li => {
        li.addEventListener('dragstart', e => {
          draggingId = li.dataset.catId;
          draggingIsSubcat = li.classList.contains('subcat');
          draggingParentId = li.dataset.parentId || null;
          li.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
        });
        li.addEventListener('dragend', () => {
          li.classList.remove('dragging');
          clearIndicators();
          draggingId = null;
        });
        li.addEventListener('dragover', e => {
          e.preventDefault();
          if (!draggingId || li.dataset.catId === draggingId) return;
          const targetIsSubcat = li.classList.contains('subcat');
          if (draggingIsSubcat !== targetIsSubcat) return;
          if (draggingIsSubcat && li.dataset.parentId !== draggingParentId) return;
          clearIndicators();
          const rect = li.getBoundingClientRect();
          li.classList.add(e.clientY < rect.top + rect.height / 2 ? 'drag-over-above' : 'drag-over-below');
        });
        li.addEventListener('dragleave', () => clearIndicators());
        li.addEventListener('drop', e => {
          e.preventDefault();
          clearIndicators();
          const target = getDropTarget(e);
          if (target) commitReorder(target.el.dataset.catId, target.above);
        });
      });
    }
